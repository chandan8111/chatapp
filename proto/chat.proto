syntax = "proto3";

package chat;

option go_package = "github.com/chatapp/proto";

message ChatMessage {
  string message_id = 1;           // UUID for message identification
  string conversation_id = 2;      // Partition key for Kafka
  string sender_id = 3;            // User ID of sender
  int64 timestamp = 4;             // Unix timestamp in nanoseconds
  bytes ciphertext = 5;            // Encrypted message content
  bytes ephemeral_public_key = 6;  // Ephemeral public key for Double Ratchet
  int32 message_type = 7;          // 0: text, 1: image, 2: file, 3: voice
  map<string, string> metadata = 8; // Additional message metadata
  bytes previous_message_signature = 9; // For message chaining
}

message DeliveryReceipt {
  string message_id = 1;
  string user_id = 2;
  int64 timestamp = 3;
  int32 status = 4; // 0: delivered, 1: read
}

message UserPresence {
  string user_id = 1;
  bool online = 2;
  int64 last_seen = 3;
  string device_id = 4;
}

message Heartbeat {
  string user_id = 1;
  int64 timestamp = 2;
  string node_id = 3;
}
