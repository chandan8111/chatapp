apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: chatapp
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      access: proxy
      url: http://prometheus:9090
      isDefault: true
      editable: false
      jsonData:
        timeInterval: "5s"
        httpMethod: POST
        manageAlerts: true
        alertmanagerUid: alertmanager
    - name: Alertmanager
      type: alertmanager
      access: proxy
      url: http://alertmanager:9093
      editable: false
      jsonData:
        implementation: prometheus
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: chatapp
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
    - name: 'chatapp-dashboards'
      orgId: 1
      folder: 'ChatApp'
      type: file
      disableDeletion: false
      editable: true
      options:
        path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: chatapp-overview-dashboard
  namespace: chatapp
data:
  chatapp-overview.json: |
    {
      "dashboard": {
        "id": null,
        "title": "ChatApp Overview",
        "tags": ["chatapp", "overview"],
        "timezone": "browser",
        "schemaVersion": 27,
        "refresh": "5s",
        "panels": [
          {
            "id": 1,
            "title": "Active WebSocket Connections",
            "type": "stat",
            "targets": [
              {
                "expr": "sum(websocket_gateway_active_connections)",
                "legendFormat": "Total Connections"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": {
                  "mode": "thresholds"
                },
                "thresholds": {
                  "steps": [
                    {"color": "green", "value": null},
                    {"color": "yellow", "value": 150000000},
                    {"color": "red", "value": 180000000}
                  ]
                }
              }
            },
            "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0}
          },
          {
            "id": 2,
            "title": "Messages Per Second",
            "type": "stat",
            "targets": [
              {
                "expr": "rate(websocket_gateway_messages_total[1m])",
                "legendFormat": "Messages/sec"
              }
            ],
            "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0}
          },
          {
            "id": 3,
            "title": "Online Users",
            "type": "stat",
            "targets": [
              {
                "expr": "sum(redis_online_users_bitmap_count)",
                "legendFormat": "Online Users"
              }
            ],
            "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0}
          },
          {
            "id": 4,
            "title": "Error Rate",
            "type": "stat",
            "targets": [
              {
                "expr": "rate(websocket_gateway_errors_total[5m])",
                "legendFormat": "Errors/sec"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "thresholds": {
                  "steps": [
                    {"color": "green", "value": null},
                    {"color": "yellow", "value": 0.01},
                    {"color": "red", "value": 0.05}
                  ]
                }
              }
            },
            "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0}
          },
          {
            "id": 5,
            "title": "Message Latency (99th percentile)",
            "type": "graph",
            "targets": [
              {
                "expr": "histogram_quantile(0.99, rate(websocket_gateway_message_duration_seconds_bucket[5m]))",
                "legendFormat": "P99 Latency"
              },
              {
                "expr": "histogram_quantile(0.95, rate(websocket_gateway_message_duration_seconds_bucket[5m]))",
                "legendFormat": "P95 Latency"
              },
              {
                "expr": "histogram_quantile(0.50, rate(websocket_gateway_message_duration_seconds_bucket[5m]))",
                "legendFormat": "P50 Latency"
              }
            ],
            "yAxes": [
              {
                "label": "Latency (seconds)",
                "min": 0,
                "format": "s"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4}
          },
          {
            "id": 6,
            "title": "Connection Distribution",
            "type": "graph",
            "targets": [
              {
                "expr": "websocket_gateway_active_connections",
                "legendFormat": "{{ instance }}"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4}
          },
          {
            "id": 7,
            "title": "Kafka Consumer Lag",
            "type": "graph",
            "targets": [
              {
                "expr": "kafka_consumer_group_lag{group=\"message-processors\"}",
                "legendFormat": "{{ topic }}"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12}
          },
          {
            "id": 8,
            "title": "Redis Operations",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(redis_commands_processed_total[1m])",
                "legendFormat": "Commands/sec"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12}
          },
          {
            "id": 9,
            "title": "ScyllaDB Read/Write Latency",
            "type": "graph",
            "targets": [
              {
                "expr": "scylladb_storage_proxy_coordinator_read_latency_summary{quantile=\"0.99\"}",
                "legendFormat": "Read P99"
              },
              {
                "expr": "scylladb_storage_proxy_coordinator_write_latency_summary{quantile=\"0.99\"}",
                "legendFormat": "Write P99"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 20}
          },
          {
            "id": 10,
            "title": "CPU Usage",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(process_cpu_seconds_total[5m]) * 100",
                "legendFormat": "{{ job }}"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 20}
          },
          {
            "id": 11,
            "title": "Memory Usage",
            "type": "graph",
            "targets": [
              {
                "expr": "process_resident_memory_bytes / 1024 / 1024",
                "legendFormat": "{{ job }} (MB)"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 28}
          },
          {
            "id": 12,
            "title": "HPA Scaling Events",
            "type": "graph",
            "targets": [
              {
                "expr": "kube_hpa_status_current_replicas",
                "legendFormat": "{{ hpa }}"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 28}
          },
          {
            "id": 13,
            "title": "Presence Updates Per Second",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(presence_updates_total[1m])",
                "legendFormat": "Updates/sec"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 36}
          },
          {
            "id": 14,
            "title": "Fanout Queue Depth",
            "type": "graph",
            "targets": [
              {
                "expr": "fanout_queue_depth",
                "legendFormat": "Queue Depth"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 36}
          }
        ]
      }
    }
