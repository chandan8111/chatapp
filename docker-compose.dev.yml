version: '3.8'

services:
  # Redis for development
  redis:
    image: redis:7-alpine
    container_name: chatapp-redis-dev
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - chatapp-dev-network

  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: chatapp-zookeeper-dev
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped
    volumes:
      - zookeeper_dev_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - chatapp-dev-network

  # Kafka for development
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: chatapp-kafka-dev
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    restart: unless-stopped
    volumes:
      - kafka_dev_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - chatapp-dev-network

  # ScyllaDB for development
  scylla:
    image: scylladb/scylla:5.1.0
    container_name: chatapp-scylla-dev
    ports:
      - "9042:9042"
    restart: unless-stopped
    command: --seeds=scylla --broadcast-address=scylla --listen-address=scylla --broadcast-rpc-address=scylla
    volumes:
      - scylla_dev_data:/var/lib/scylla
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - chatapp-dev-network

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:v2.40.0
    container_name: chatapp-prometheus-dev
    ports:
      - "9090:9090"
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus-dev.yml:/etc/prometheus/prometheus.yml
      - prometheus_dev_data:/prometheus
    networks:
      - chatapp-dev-network

volumes:
  redis_dev_data:
  zookeeper_dev_data:
  kafka_dev_data:
  scylla_dev_data:
  prometheus_dev_data:

networks:
  chatapp-dev-network:
    driver: bridge
