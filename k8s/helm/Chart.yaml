apiVersion: v2
name: chatapp
description: A distributed chat system for 100M concurrent users
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - chat
  - messaging
  - realtime
  - websocket
  - distributed
home: https://github.com/chatapp/chatapp
sources:
  - https://github.com/chatapp/chatapp
maintainers:
  - name: ChatApp Team
    email: team@chatapp.com
dependencies:
  - name: redis-cluster
    version: "8.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
    alias: redis
  - name: kafka
    version: "26.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: kafka.enabled
    alias: kafka
  - name: scylladb
    version: "1.x.x"
    repository: https://charts.scylladb.com
    condition: scylladb.enabled
    alias: scylladb
annotations:
  category: Chat/Messaging
