apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chatapp.gateway.name" . }}
  labels:
    {{- include "chatapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
    app.kubernetes.io/name: {{ include "chatapp.gateway.name" . }}
spec:
  {{- if not .Values.websocketGateway.hpa.enabled }}
  replicas: {{ .Values.websocketGateway.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "chatapp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "chatapp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.global.monitoring.port }}"
        prometheus.io/path: "/metrics"
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "chatapp.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                  - gateway
              topologyKey: kubernetes.io/hostname
          - weight: 50
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                  - gateway
              topologyKey: topology.kubernetes.io/zone
      containers:
      - name: gateway
        image: "{{ .Values.websocketGateway.image.repository }}:{{ .Values.websocketGateway.image.tag }}"
        imagePullPolicy: {{ .Values.websocketGateway.image.pullPolicy }}
        ports:
        - name: websocket
          containerPort: {{ .Values.websocketGateway.config.server.port }}
          protocol: TCP
        - name: metrics
          containerPort: {{ .Values.global.monitoring.port }}
          protocol: TCP
        env:
        {{- range .Values.websocketGateway.env }}
        - name: {{ .name }}
          {{- if .value }}
          value: {{ .value | quote }}
          {{- else if .valueFrom }}
          valueFrom:
            {{- toYaml .valueFrom | nindent 12 }}
          {{- end }}
        {{- end }}
        - name: ENVIRONMENT
          value: {{ .Values.global.environment | quote }}
        - name: SERVICE_NAME
          value: "websocket-gateway"
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: CONFIG_PATH
          value: "/etc/chatapp/config.yaml"
        resources:
          {{- toYaml .Values.websocketGateway.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /health
            port: websocket
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: websocket
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        lifecycle:
          preStop:
            httpGet:
              path: /shutdown
              port: websocket
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: config
          mountPath: /etc/chatapp
          readOnly: true
        - name: tls
          mountPath: /etc/tls
          readOnly: true
          {{- if .Values.global.security.tls.enabled }}
          {{- end }}
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 1Gi
      - name: config
        configMap:
          name: {{ include "chatapp.config.name" . }}
      - name: tls
        secret:
          secretName: {{ .Values.global.security.tls.certSecret | default (printf "%s-tls" (include "chatapp.fullname" .)) }}
          {{- if .Values.global.security.tls.enabled }}
          {{- end }}
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chatapp.gateway.name" . }}
  labels:
    {{- include "chatapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  annotations:
    {{- with .Values.websocketGateway.service.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: {{ .Values.websocketGateway.service.type }}
  ports:
  - name: websocket
    port: {{ .Values.websocketGateway.service.port }}
    targetPort: websocket
    protocol: TCP
  - name: metrics
    port: {{ .Values.global.monitoring.port }}
    targetPort: metrics
    protocol: TCP
  selector:
    {{- include "chatapp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
---
{{- if .Values.websocketGateway.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "chatapp.gateway.name" . }}
  labels:
    {{- include "chatapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "chatapp.gateway.name" . }}
  minReplicas: {{ .Values.websocketGateway.hpa.minReplicas }}
  maxReplicas: {{ .Values.websocketGateway.hpa.maxReplicas }}
  metrics:
  {{- if .Values.websocketGateway.hpa.targetCPUUtilizationPercentage }}
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.websocketGateway.hpa.targetCPUUtilizationPercentage }}
  {{- end }}
  {{- if .Values.websocketGateway.hpa.targetMemoryUtilizationPercentage }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ .Values.websocketGateway.hpa.targetMemoryUtilizationPercentage }}
  {{- end }}
  {{- with .Values.websocketGateway.hpa.metrics }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 10
        periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
      - type: Pods
        value: 5
        periodSeconds: 60
      selectPolicy: Min
{{- end }}
---
{{- if .Values.websocketGateway.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "chatapp.gateway.name" . }}
  labels:
    {{- include "chatapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  minAvailable: {{ .Values.websocketGateway.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "chatapp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
{{- end }}
