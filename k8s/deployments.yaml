apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: chatapp
data:
  config.yaml: |
    server:
      port: 8080
      read_timeout: 15s
      write_timeout: 15s
      idle_timeout: 60s
      max_connections: 200000
    
    websocket:
      read_buffer_size: 1024
      write_buffer_size: 1024
      ping_period: 54s
      pong_wait: 60s
      write_wait: 10s
      max_message_size: 8192
    
    redis:
      max_retries: 3
      pool_size: 100
      min_idle_conns: 10
      max_conn_age: 1h
      read_timeout: 100ms
      write_timeout: 100ms
      pool_timeout: 30s
      idle_timeout: 5m
    
    kafka:
      producer_flush_frequency: 100ms
      producer_flush_messages: 100
      max_message_bytes: 10485760
      required_acks: all
      retry_max: 5
      retry_backoff: 100ms
      compression: snappy
    
    metrics:
      enabled: true
      port: 9090
      path: /metrics
    
    logging:
      level: info
      format: json
    
    security:
      tls_enabled: true
      min_version: "1.2"
      cert_file: /etc/certs/tls.crt
      key_file: /etc/certs/tls.key
