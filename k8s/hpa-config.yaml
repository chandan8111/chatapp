    component: fanout
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fanout-service
  minReplicas: 3
  maxReplicas: 30
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85
  - type: External
    external:
      metric:
        name: fanout_queue_depth
        selector:
          matchLabels:
            app: fanout-service
      target:
        type: Value
        value: "10000"
  - type: External
    external:
      metric:
        name: celebrity_message_rate
        selector:
          matchLabels:
            app: fanout-service
      target:
        type: Value
