  namespace: chatapp
  labels:
    app: message-processor
spec:
  selector:
    matchLabels:
      app: message-processor
  endpoints:
  - port: metrics
    interval: 15s
    path: /metrics
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hpa-scaling-config
  namespace: chatapp
data:
  scaling.yaml: |
    # Connection-based scaling thresholds
    connection_thresholds:
      low: 50000      # Scale down when < 50k connections
      target: 150000  # Target 150k connections per pod
      high: 180000    # Scale up when > 180k connections
      max: 200000     # Max 200k connections per pod
    
    # Rate limiting for scaling
    scaling_limits:
      max_scale_up_percent: 200    # Max 200% scale up per event
      max_scale_down_percent: 50   # Max 50% scale down per event
      scale_up_cooldown: 30s       # Wait 30s between scale ups
      scale_down_cooldown: 300s    # Wait 5min between scale downs
    
    # Resource allocation per connection
    resources_per_connection:
      cpu_cores: 0.0005    # 0.5m CPU per connection
      memory_mb: 0.5       # 0.5MB memory per connection
    
    # Celebrity message handling
    celebrity_thresholds:
      follower_count: 100000
      message_rate: 1000
      fanout_batch_size: 100
    
    # Health check thresholds
    health_checks:
      cpu_threshold: 90
      memory_threshold: 90
      latency_threshold: 100ms
      error_rate_threshold: 0.05
